# https://github.com/yte-template-engine/yte/tree/main
__use_yte__: true
__definitions__:
  - |
    def inclusive_range_mult(start, stop, mult):
      result = []
      while start <= stop:
        result += [start]
        start *= mult
      return result

    def inclusive_range_add(start, stop, step):
      result = []
      while start <= stop:
        result += [round(start, 3)]
        start += step
      return result

